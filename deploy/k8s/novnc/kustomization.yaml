apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openstack

# Generates a ConfigMap whose name suffix is a hash of sunrise.html, so any
# edit to the file rotates the name and triggers a fresh rollout of the
# nova-novncproxy Deployment.
configMapGenerator:
  - name: sunrise-novnc
    files:
      - sunrise.html
  # Self-hosted Inter font files referenced by sunrise.html via
  # url("./fonts/Inter-*.woff2"). Run `./fonts/download.sh` once before
  # building this overlay.
  - name: sunrise-novnc-fonts
    files:
      - fonts/Inter-Regular.woff2
      - fonts/Inter-Medium.woff2
      - fonts/Inter-SemiBold.woff2

# Apply the mount patch on top of whatever Deployment is already in your
# cluster (or whatever base you compose this overlay onto).
patches:
  - path: deployment-patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: nova-novncproxy
